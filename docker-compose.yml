services:
  app:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    env_file: .env
    environment: { DATABASE_URL: ${DATABASE_URL:-postgresql://flowpilot:flowpilot@postgres:5432/flowpilot?schema=public}, REDIS_URL: ${REDIS_URL:-redis://redis:6379}, PORT: ${PORT:-3001}, SMTP_HOST: ${SMTP_HOST:-mailhog}, SMTP_PORT: ${SMTP_PORT:-1025} }
    healthcheck: { test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"], interval: 10s, timeout: 5s, retries: 10 }
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy }, mailhog: { condition: service_started } }
  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    healthcheck: { test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"], interval: 10s, timeout: 5s, retries: 10 }
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: flowpilot, POSTGRES_USER: flowpilot, POSTGRES_PASSWORD: flowpilot }
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U flowpilot -d flowpilot"], interval: 10s, timeout: 5s, retries: 10 }
  redis:
    image: redis:7-alpine
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 10s, timeout: 5s, retries: 10 }
  mailhog:
    image: mailhog/mailhog:latest
    ports: ["1025:1025", "8025:8025"]
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment: { MINIO_ROOT_USER: ${MINIO_ROOT_USER:-flowpilot}, MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-flowpilot123}, MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000} }
    healthcheck: { test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"], interval: 10s, timeout: 5s, retries: 10 }
  caddy:
    image: caddy:2-alpine
    ports: ["3000:3000"]
    volumes: ["./Caddyfile:/etc/caddy/Caddyfile:ro"]
    depends_on: { app: { condition: service_healthy }, web: { condition: service_healthy } }
    healthcheck: { test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"], interval: 10s, timeout: 5s, retries: 10 }
